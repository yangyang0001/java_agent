<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>余弦相似度 动态演示</title>
<style>
  :root {
    --bg:#faf9f6; --surface:#ffffff; --surface-2:#f1efe9;
    --text:#1b1e22; --text-2:#5b5c57; --text-3:#8b8a83;
    --border:rgba(27,30,34,0.12);
    --accent-a:#2a78d6; --accent-b:#eb6834;
    --good:#0ca30c; --bad:#d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#14161a; --surface:#1c1f24; --surface-2:#22252b;
      --text:#eceae4; --text-2:#a7a9a0; --text-3:#797b76;
      --border:rgba(236,234,228,0.14);
      --accent-a:#5b9bef; --accent-b:#f0985e;
      --good:#3fbd7c; --bad:#e0645a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; justify-content: center; padding: 32px 16px;
  }
  .panel {
    width: 100%; max-width: 560px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; padding: 24px;
    display: flex; flex-direction: column; gap: 18px;
  }
  h1 { margin: 0; font-size: 20px; }
  .stage { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; }
  canvas { max-width: 100%; height: auto; }
  .readout { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 14px; }
  .legend { display: flex; gap: 16px; font-size: 13px; color: var(--text-2); }
  .legend .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; }
  .dot-a { background: var(--accent-a); } .dot-b { background: var(--accent-b); }
  .row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .row-label { font-size: 13px; color: var(--text-2); }
  .row-value { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .bar { display: flex; align-items: center; gap: 8px; }
  .bar-tick { font-size: 12px; color: var(--text-3); font-family: ui-monospace, monospace; }
  .bar-track { position: relative; flex: 1; height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--bad) 0%, var(--surface-2) 50%, var(--good) 100%); }
  .bar-marker { position: absolute; top: 50%; left: 100%; width: 13px; height: 13px; border-radius: 50%; background: var(--text); border: 2px solid var(--surface); transform: translate(-50%,-50%); }
  .caption { font-size: 13px; color: var(--text-3); margin: 0; }
</style>
</head>
<body>
  <div class="panel">
    <h1>余弦相似度：向量 B 旋转演示</h1>
    <div class="stage">
      <canvas id="c" width="300" height="280" aria-label="余弦相似度动态演示"></canvas>
      <div class="readout">
        <div class="legend">
          <span><span class="dot dot-a"></span>A（固定）</span>
          <span><span class="dot dot-b"></span>B（旋转+伸缩）</span>
        </div>
        <div class="row"><span class="row-label">夹角 θ</span><span class="row-value" id="angleVal">0°</span></div>
        <div class="row"><span class="row-label">cos θ</span><span class="row-value" id="cosVal">1.000</span></div>
        <div class="bar">
          <span class="bar-tick">-1</span>
          <div class="bar-track"><div class="bar-marker" id="marker"></div></div>
          <span class="bar-tick">1</span>
        </div>
      </div>
    </div>
    <p class="caption">虚线为 B 在 A 方向上的投影，对应点积 A·B 的几何含义。B 的长度周期性变化，但只要夹角不变，cos θ 不变。</p>
  </div>
<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var angleValEl = document.getElementById('angleVal');
  var cosValEl = document.getElementById('cosVal');
  var markerEl = document.getElementById('marker');
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var cx = canvas.width / 2, cy = canvas.height / 2 + 10;
  var thetaA = -25 * Math.PI / 180, lenA = 95;

  function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  function drawArrow(x0, y0, x1, y1, color, width) {
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = width;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    var angle = Math.atan2(y1 - y0, x1 - x0), headLen = 9;
    ctx.beginPath(); ctx.moveTo(x1, y1);
    ctx.lineTo(x1 - headLen * Math.cos(angle - Math.PI / 6), y1 - headLen * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x1 - headLen * Math.cos(angle + Math.PI / 6), y1 - headLen * Math.sin(angle + Math.PI / 6));
    ctx.closePath(); ctx.fill();
  }

  function render(t) {
    var w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = cssVar('--border') || '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

    var time = reduceMotion ? 0 : t;
    var thetaB = (time / 6000 * Math.PI * 2) % (Math.PI * 2);
    var lenB = 70 + 30 * Math.sin(time / 1700);
    var ax = cx + lenA * Math.cos(thetaA), ay = cy + lenA * Math.sin(thetaA);
    var bx = cx + lenB * Math.cos(thetaB), by = cy + lenB * Math.sin(thetaB);
    var diff = thetaB - thetaA, cos = Math.cos(diff);
    var proj = lenB * cos;
    var px = cx + proj * Math.cos(thetaA), py = cy + proj * Math.sin(thetaA);

    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = cssVar('--text-3') || '#999';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(px, py); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = cssVar('--text-2') || '#666';
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(cx, cy, 26, thetaA, thetaB, thetaB < thetaA); ctx.stroke();

    var colorA = cssVar('--accent-a') || '#2a78d6';
    var colorB = cssVar('--accent-b') || '#eb6834';
    drawArrow(cx, cy, ax, ay, colorA, 3);
    drawArrow(cx, cy, bx, by, colorB, 3);

    ctx.font = '13px system-ui, sans-serif';
    ctx.fillStyle = colorA;
    ctx.fillText('A', ax + (ax > cx ? 8 : -18), ay + (ay > cy ? 16 : -8));
    ctx.fillStyle = colorB;
    ctx.fillText('B', bx + (bx > cx ? 8 : -18), by + (by > cy ? 16 : -8));

    var deg = (((thetaB - thetaA) * 180 / Math.PI) % 360 + 360) % 360;
    var degShown = deg > 180 ? 360 - deg : deg;
    angleValEl.textContent = degShown.toFixed(0) + '°';
    cosValEl.textContent = cos.toFixed(3);
    markerEl.style.left = ((cos + 1) / 2 * 100) + '%';

    if (!reduceMotion) requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
