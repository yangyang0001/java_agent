<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>tanh 函数 动态演示</title>
<style>
  :root {
    --bg:#faf9f6; --surface:#ffffff; --surface-2:#f1efe9;
    --text:#1b1e22; --text-2:#5b5c57; --text-3:#8b8a83;
    --border:rgba(27,30,34,0.12);
    --accent-a:#8b5cf6; --accent-b:#eb6834;
    --good:#0ca30c; --bad:#d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#14161a; --surface:#1c1f24; --surface-2:#22252b;
      --text:#eceae4; --text-2:#a7a9a0; --text-3:#797b76;
      --border:rgba(236,234,228,0.14);
      --accent-a:#a78bfa; --accent-b:#f0985e;
      --good:#3fbd7c; --bad:#e0645a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex; justify-content: center; padding: 32px 16px;
  }
  .panel {
    width: 100%; max-width: 640px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px; padding: 24px;
    display: flex; flex-direction: column; gap: 18px;
  }
  h1 { margin: 0; font-size: 20px; }
  .stage { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
  canvas { max-width: 100%; height: auto; background: var(--surface-2); border-radius: 10px; }
  .readout { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .row-label { font-size: 13px; color: var(--text-2); }
  .row-value { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .zone { font-size: 12.5px; padding: 6px 10px; border-radius: 8px; background: var(--surface-2); color: var(--text-2); }
  .zone.saturated { color: var(--bad); }
  .zone.linear { color: var(--good); }
  .caption { font-size: 13px; color: var(--text-3); margin: 0; }
</style>
</head>
<body>
  <div class="panel">
    <h1>tanh：饱和曲线动态演示</h1>
    <div class="stage">
      <canvas id="c" width="360" height="280" aria-label="tanh 曲线动态演示，一个点沿曲线来回滑动并显示切线"></canvas>
      <div class="readout">
        <div class="row"><span class="row-label">x</span><span class="row-value" id="xVal">0.00</span></div>
        <div class="row"><span class="row-label">tanh(x)</span><span class="row-value" id="yVal">0.000</span></div>
        <div class="row"><span class="row-label">切线斜率 tanh'(x)</span><span class="row-value" id="slopeVal">1.000</span></div>
        <div class="zone" id="zoneLabel">线性区：斜率接近 1，输入变化几乎原样传递</div>
      </div>
    </div>
    <p class="caption">
      紫色点沿 tanh 曲线来回滑动，橙色短线是当前点的切线，切线的陡峭程度就是 tanh'(x) =
      1 − tanh²(x)。越靠近中心 x=0，切线越陡（接近 45°，斜率≈1）；越往两端滑，切线越
      平缓，斜率趋于 0——这就是「饱和」，也是 RNN 反向传播时梯度会被压缩变小的直接原因。
    </p>
  </div>
<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var xValEl = document.getElementById('xVal');
  var yValEl = document.getElementById('yVal');
  var slopeValEl = document.getElementById('slopeVal');
  var zoneLabelEl = document.getElementById('zoneLabel');
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var w = canvas.width, h = canvas.height;
  var xMin = -4, xMax = 4;
  var cx = w / 2, cy = h / 2;
  var scaleX = (w - 40) / (xMax - xMin); // px per unit x
  var scaleY = (h - 40) / 2.6; // px per unit y (y range about -1.3..1.3)

  function toPx(x) { return cx + x * scaleX; }
  function toPy(y) { return cy - y * scaleY; }

  function tanh(x) { return Math.tanh(x); }
  function dtanh(x) { var t = Math.tanh(x); return 1 - t * t; }

  function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  var PERIOD = reduceMotion ? 1 : 5200;

  function render(t) {
    ctx.clearRect(0, 0, w, h);
    var border = cssVar('--border') || '#ddd';
    var text3 = cssVar('--text-3') || '#999';
    var colorCurve = cssVar('--accent-a') || '#8b5cf6';
    var colorTangent = cssVar('--accent-b') || '#eb6834';

    // 坐标轴
    ctx.strokeStyle = border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(20, cy); ctx.lineTo(w - 20, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, 20); ctx.lineTo(cx, h - 20); ctx.stroke();

    // 渐近线 y = 1 / y = -1
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = text3; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(20, toPy(1)); ctx.lineTo(w - 20, toPy(1)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20, toPy(-1)); ctx.lineTo(w - 20, toPy(-1)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = text3; ctx.font = '11px system-ui, sans-serif';
    ctx.fillText('+1', w - 34, toPy(1) - 5);
    ctx.fillText('-1', w - 34, toPy(-1) + 13);

    // tanh 曲线
    ctx.strokeStyle = colorCurve; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (var i = 0; i <= 200; i++) {
      var x = xMin + (xMax - xMin) * i / 200;
      var y = tanh(x);
      var px = toPx(x), py = toPy(y);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // 移动的点：来回滑动（ping-pong），用 sin 做缓动
    var time = reduceMotion ? 0 : t;
    var phase = (time / PERIOD) % 1;
    var xCur = xMin + (xMax - xMin) * (0.5 + 0.5 * Math.sin(2 * Math.PI * phase - Math.PI / 2));
    var yCur = tanh(xCur);
    var slope = dtanh(xCur);
    var pxCur = toPx(xCur), pyCur = toPy(yCur);

    // 切线
    var dxUnits = 1.1;
    var x1 = xCur - dxUnits, x2 = xCur + dxUnits;
    var y1 = yCur + slope * (x1 - xCur), y2 = yCur + slope * (x2 - xCur);
    ctx.strokeStyle = colorTangent; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(toPx(x1), toPy(y1)); ctx.lineTo(toPx(x2), toPy(y2)); ctx.stroke();

    // 当前点
    ctx.beginPath(); ctx.arc(pxCur, pyCur, 5, 0, Math.PI * 2);
    ctx.fillStyle = colorCurve; ctx.fill();

    // ---- 更新数值面板 ----
    xValEl.textContent = xCur.toFixed(2);
    yValEl.textContent = yCur.toFixed(3);
    slopeValEl.textContent = slope.toFixed(3);

    if (slope > 0.7) {
      zoneLabelEl.textContent = '线性区：斜率接近 1，输入变化几乎原样传递';
      zoneLabelEl.className = 'zone linear';
    } else if (slope < 0.15) {
      zoneLabelEl.textContent = '饱和区：斜率接近 0，梯度反传到这里会被大幅压缩';
      zoneLabelEl.className = 'zone saturated';
    } else {
      zoneLabelEl.textContent = '过渡区：斜率正在减小';
      zoneLabelEl.className = 'zone';
    }

    if (!reduceMotion) requestAnimationFrame(render);
  }

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
